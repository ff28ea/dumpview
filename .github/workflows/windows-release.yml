name: publish-windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches app version
        if: github.event_name == 'push'
        shell: pwsh
        run: |
          $config = Get-Content 'src-tauri/tauri.conf.json' -Raw | ConvertFrom-Json
          $expectedTag = "v$($config.version)"
          $actualTag = "${{ github.ref_name }}"
          if ($actualTag -ne $expectedTag) {
            throw "Release tag $actualTag does not match src-tauri/tauri.conf.json version $($config.version). Expected $expectedTag."
          }

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish Windows release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'dumpview v__VERSION__'
          releaseBody: 'Windows installer build for dumpview.'
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
          args: --bundles nsis
          releaseAssetNamePattern: '[name]_[version]_[platform]_[arch][setup][ext]'
